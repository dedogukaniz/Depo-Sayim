<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depo Sayım</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
margin:0;
padding:10px;
font-family:Arial, sans-serif;
background:#f2f2f2;
font-size:24px;
}

video{
width:100%;
height:180px;
object-fit:cover;
border:2px solid #444;
margin-bottom:10px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select,button{
width:100%;
padding:16px;
margin-top:6px;
margin-bottom:10px;
font-size:24px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2e7d32;
color:white;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
font-size:22px;
}

th,td{
border:1px solid #ccc;
padding:12px;
text-align:center;
}

th{
background:#ddd;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<label>Raf No</label>
<select id="raf"></select>

<label>Stok Kodu</label>
<input id="stok" placeholder="30.01.2121">

<label>Adet</label>
<input id="adet" type="number" value="1">

<label>Kullanıcı</label>
<select id="kullanici">
<option>Ali</option>
<option>İsmet</option>
<option>İsa</option>
<option>Fatih</option>
<option>Ersin</option>
</select>

<button onclick="stokEkle()">Stok Ekle</button>
<button onclick="excelIndir()">Excel İndir</button>
<button onclick="kameraDegistir()">Kamera Değiş</button>

<table>
<thead>
<tr>
<th>Stok No</th>
<th>Adet</th>
<th>Raf</th>
<th>Kullanıcı</th>
<th>Tarih</th>
</tr>
</thead>
<tbody id="liste"></tbody>
</table>

<script>
let rafSelect=document.getElementById("raf")

for(let r=1;r<=64;r++){
 for(let s=1;s<=5;s++){
  let opt=document.createElement("option")
  opt.value="F"+r+"-"+s
  opt.text="F"+r+"-"+s
  rafSelect.appendChild(opt)
 }
}

let sonRaf=localStorage.getItem("sonRaf")
if(sonRaf){
 rafSelect.value=sonRaf
}

let veri=[]

function stokEkle(){
 let stok=document.getElementById("stok").value.trim()
 let adet=parseInt(document.getElementById("adet").value)
 let raf=document.getElementById("raf").value
 let kullanici=document.getElementById("kullanici").value
 let tarih=new Date().toLocaleString("tr-TR")

 if(stok==="") return

 veri.push({
  stok:stok,
  adet:adet,
  raf:raf,
  kullanici:kullanici,
  tarih:tarih
 })

 localStorage.setItem("sonRaf",raf)
 listeGuncelle()
 document.getElementById("stok").value=""
}

function listeGuncelle(){
 let tbody=document.getElementById("liste")
 tbody.innerHTML=""

 veri.forEach((item,index)=>{
  let tr=document.createElement("tr")
  tr.innerHTML=`
  <td>${item.stok}</td>
  <td onclick="adetDegistir(${index})">${item.adet}</td>
  <td>${item.raf}</td>
  <td>${item.kullanici}</td>
  <td>${item.tarih}</td>
  `
  tbody.appendChild(tr)
 })
}

function adetDegistir(i){
 let yeni=prompt("Yeni adet gir",veri[i].adet)
 if(yeni!=null){
  veri[i].adet=parseInt(yeni)
  listeGuncelle()
 }
}

function excelIndir(){
 let ws=XLSX.utils.json_to_sheet(veri)
 let wb=XLSX.utils.book_new()
 XLSX.utils.book_append_sheet(wb,ws,"Sayim")
 let rafAdi=localStorage.getItem("sonRaf") || "sayim"
 XLSX.writeFile(wb,rafAdi+".xlsx")
}

let video=document.getElementById("camera")
let stream
let kamera="environment"

async function kameraBaslat(){
 if(stream){
  stream.getTracks().forEach(track=>track.stop())
 }

 stream=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:kamera}
 })

 video.srcObject=stream
}

function kameraDegistir(){
 kamera=kamera==="environment"?"user":"environment"
 kameraBaslat()
}

kameraBaslat()
</script>

</body>
</html>
