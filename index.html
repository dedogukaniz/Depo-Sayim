<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Depo Sayım – Canlı OCR</title>

<!-- Tesseract.js OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
h2{margin-bottom:20px}
select,input,button{display:block;margin:10px 0;padding:10px;width:260px;font-size:14px}
table{border-collapse:collapse;width:100%;margin-top:30px;background:white}
td,th{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#eee}
#camera{width:100%;max-width:360px;margin-top:20px;border:1px solid #aaa;padding:5px}
</style>
</head>
<body>

<h2>📦 Depo Sayım Sistemi – Canlı OCR</h2>

<label>Kullanıcı</label>
<select id="user">
<option>Ali</option>
<option>İsmet</option>
<option>İsa</option>
<option>Fatih</option>
<option>Ersin</option>
</select>

<label>Raf</label>
<select id="raf"></select>

<label>Stok Kodu</label>
<input type="text" id="stokInput" maxlength="10" placeholder="30.01.2121">

<label>Adet</label>
<input type="number" id="adetInput" value="1" min="1">

<button onclick="stokEkle()">Stok Ekle (Manuel)</button>
<button onclick="excelIndir()">Excel İndir</button>

<h3>Kamera – Canlı OCR</h3>
<video id="camera" autoplay playsinline></video>

<table>
<thead>
<tr>
<th>Tarih</th>
<th>Kullanıcı</th>
<th>Raf</th>
<th>Stok Kodu</th>
<th>Adet</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
// RAF LİSTESİ
const raf=document.getElementById("raf")
for(let r=1;r<=64;r++){
for(let s=1;s<=5;s++){
let opt=document.createElement("option")
opt.value=`F${r}-${s}`
opt.text=`F${r}-${s}`
raf.appendChild(opt)
}
}

// VERİ
let data=[];

// STOK EKLE (MANUEL VEYA OCR)
function stokEkle(tarihParam){
let stok=document.getElementById("stokInput").value.trim()
let adet=parseInt(document.getElementById("adetInput").value)
let user=document.getElementById("user").value
let raf=document.getElementById("raf").value
let today = new Date()
let tarih = tarihParam || today.getDate().toString().padStart(2,'0') + '.' + (today.getMonth()+1).toString().padStart(2,'0') + '.' + today.getFullYear()
if(!/^\d{2}\.\d{2}\.\d{4}$/.test(stok)){
alert("Stok formatı 30.01.2121 olmalı")
return
}
let item=data.find(x=>x.stok===stok && x.raf===raf)
if(item){item.adet+=adet}else{
data.push({tarih:tarih,user:user,raf:raf,stok:stok,adet:adet})
}
updateTable()
document.getElementById("stokInput").value=""
document.getElementById("adetInput").value=1
}

// TABLO GÜNCELLE
function updateTable(){
let tbody=document.getElementById("table")
tbody.innerHTML=""
data.forEach(r=>{
tbody.innerHTML+=`<tr>
<td>${r.tarih}</td>
<td>${r.user}</td>
<td>${r.raf}</td>
<td>${r.stok}</td>
<td>${r.adet}</td>
</tr>`
})
}

// EXCEL İNDİR
function excelIndir(){
let csv="Tarih;Kullanıcı;Raf;Stok Kodu;Adet\n"
data.forEach(r=>{
csv+=`${r.tarih};${r.user};${r.raf};${r.stok};${r.adet}\n`
})
let blob=new Blob([csv],{type:"text/csv;charset=utf-8;"})
let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="depo_sayim.csv"
link.click()
}

// OTOMATİK FORMAT
document.getElementById("stokInput").addEventListener("input",function(){
let v=this.value.replace(/\D/g,"")
if(v.length>2)v=v.slice(0,2)+"."+v.slice(2)
if(v.length>5)v=v.slice(0,5)+"."+v.slice(5)
this.value=v.slice(0,10)
})

// KAMERA AYAR
const video=document.getElementById("camera")
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{video.srcObject=stream})
.catch(err=>{alert("Kamera açılamadı: "+err)})

// CANLI OCR (her 1 saniye)
const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")
setInterval(()=>{
if(video.readyState===video.HAVE_ENOUGH_DATA){
canvas.width=video.videoWidth
canvas.height=video.videoHeight
ctx.drawImage(video,0,0,canvas.width,canvas.height)
Tesseract.recognize(canvas,'eng',{logger:m=>console.log(m)})
.then(({data:{text}})=>{
const match=text.match(/\b\d{2}\.\d{2}\.\d{4}\b/)
if(match){
document.getElementById("stokInput").value=match[0]
stokEkle()
}
}).catch(()=>{})
}
},1000)

</script>
</body>
</html>
